name: Bug report
description: Report a bug or broken behavior in Bumpkin
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, sample diff, workflow config, or repo details that reproduce it.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include versioning scheme, language, provider setup, or anything else that matters.
